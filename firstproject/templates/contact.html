{% extends 'base.html' %}

{% block title %}Contact | MediCare Pro{% endblock %}

{% block extra_css %}
<style>
    .contact-box{
        background:#111827;
        padding:40px;
        border-radius:25px;
        border:1px solid rgba(255,255,255,0.06);
    }

    .form-control,
    textarea.form-control{
        background:#1e293b;
        border:1px solid transparent;
        color:white;
        border-radius:16px;
        padding:16px 18px;
    }

    .form-control::placeholder,
    textarea.form-control::placeholder{
        color:#94a3b8;
    }

    .form-control:focus,
    textarea.form-control:focus{
        background:#1e293b;
        color:white;
        box-shadow:none;
        border-color:#8b5cf6;
    }

    .contact-btn{
        background:linear-gradient(to right,#8b5cf6,#06b6d4);
        border:none;
        color:white;
        border-radius:16px;
        padding:14px 18px;
        font-weight:600;
    }
</style>
{% endblock %}

{% block content %}
<section class="page-section">
    <div class="container">
        <div class="section-heading">
            <h1>Contact Us</h1>
            <p>Reach out for appointments, service inquiries, or emergency support coordination.</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="contact-box">
                    <form>
                        <div class="mb-3">
                            <input type="text" class="form-control" placeholder="Your Name">
                        </div>

                        <div class="mb-3">
                            <input type="email" class="form-control" placeholder="Your Email">
                        </div>

                        <div class="mb-3">
                            <textarea rows="5" class="form-control" placeholder="Your Message"></textarea>
                        </div>

                        <button class="contact-btn w-100" type="submit">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
